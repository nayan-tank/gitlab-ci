name: Release Image Build

on:
 push:
   branches: [ release ]
   paths-ignore:
     - 'tools/**'
     - 'docs/**'
jobs:
 find-changed-services:
   runs-on: ubuntu-latest
   outputs:
     services: ${{ steps.changed_subfolders.outputs.subfolders }}
     version: ${{ steps.set_version.outputs.version }}
   steps:
     - name: Checkout code
       uses: actions/checkout@v4
       with:
         fetch-depth: 0  # Fetch all history for all branches

     - name: Generate version number
       id: set_version
       run: |-
         YEAR=$(date +'%y')
         MONTH=$(date +'%m')
         DAY=$(date +'%d')
         BUILD_NUMBER=${{ github.run_number }}
         VERSION="${YEAR}.${MONTH}.${DAY}.${BUILD_NUMBER}"
         echo "version=${VERSION}" >> $GITHUB_OUTPUT
         echo "Generated version: ${VERSION}"

     - name: Get list of changed subfolders
       id: changed_subfolders
       run: |
         # Check if there are changes in the 'lib' folder
         lib_changes=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'lib/*')
        
         if [ -n "$lib_changes" ]; then
           echo "Changes detected in 'lib' folder. Including all first-level subfolders in 'src' except 'protos'."
           # Get all first-level subdirectories under 'src' except 'src/protos'
           subfolders=$(find src -mindepth 1 -maxdepth 1 -type d ! -name "protos" -printf "%f\n")
         else
           echo "No changes in 'lib' folder. Checking changed first-level subfolders in 'src', excluding 'protos'."
          
           # Get the list of changed files in 'src' directory, ignoring 'src/protos' folder
           changed_files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'src/*' ':!src/protos/*')
        
           # Extract only the first-level subfolder names, filtering out nested subdirectories
           subfolders=$(echo "$changed_files" | awk -F'/' '{print $2}' | grep -v '^protos$' | sort -u)
         fi
        
         # Convert subfolders to JSON array format
         subfolders=$(echo "$subfolders" | jq -R -s -c 'split("\n") | map(select(length > 0))')
        
         # Set the output for further use in the workflow
         echo "subfolders=$subfolders" >> $GITHUB_OUTPUT

     - name: Display changed subfolders
       run: |
         echo "Changed microservices:"
         echo "${{ steps.changed_subfolders.outputs.subfolders }}"

 build_microservices:
   name: Build
   runs-on: ubuntu-latest
   needs:
     - find-changed-services  # Depends on the output of this job
   if: needs.find-changed-services.outputs.services != '[]'  # Only run if there are changed services
   strategy:
     matrix:
       service: ${{ fromJson(needs.find-changed-services.outputs.services) }}  # Use the list of changed services
   env:
     REGISTRY: ghcr.io
     REPO_IMAGE_NAME: <org_name>/<repo_name>
     VERSION: ${{ needs.find-changed-services.outputs.version }}  # Get version from the first job

   steps:
     - name: Checkout Code
       uses: actions/checkout@v4
       with:
         submodules: 'recursive'
         token: ${{ secrets.GIT_TOKEN }}

     - name: Set up Python
       uses: actions/setup-python@v5
       with:
         python-version: '3.11'

     - name: Print version
       run: |
         echo "Version being used in this build is: $VERSION"

     - name: Initialize Pants
       uses: pantsbuild/actions/init-pants@v9
       with:
         gha-cache-key: v0
         named-caches-hash: ${{ hashFiles('python-default.lock') }}
         cache-lmdb-store: 'true'

     - name: Update VERSION variable in config file
       run: |
         sed -i "s/version = .*/version = '$VERSION'/" src/${{ matrix.service }}/main.py

     - name: 🐳 Create Docker image
       run: |
         pants package src/${{ matrix.service }}:${{ matrix.service }}_image

     - name: Log in to the Container registry
       uses: docker/login-action@v3
       with:
         registry: ${{ env.REGISTRY }}
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}

     - name: 📦 Push image to registry
       run: |-
         docker tag ${{ matrix.service }}_image:latest ${{ env.REGISTRY }}/${{ env.REPO_IMAGE_NAME }}/${{ matrix.service }}_image:latest
         docker tag ${{ matrix.service }}_image:latest ${{ env.REGISTRY }}/${{ env.REPO_IMAGE_NAME }}/${{ matrix.service }}_image:$VERSION
         docker push ${{ env.REGISTRY }}/${{ env.REPO_IMAGE_NAME }}/${{ matrix.service }}_image:latest
         docker push ${{ env.REGISTRY }}/${{ env.REPO_IMAGE_NAME }}/${{ matrix.service }}_image:$VERSION

 update_readme:
   name: Update README with Service Versions
   runs-on: ubuntu-latest
   needs:
     - find-changed-services
     - build_microservices  # Depends on the build_microservices output
   steps:
     - name: Checkout .github-private repo
       uses: actions/checkout@v4
       with:
         repository: <org_name>/.github-private
         path: .github-private
         ref: 'main'
         token: ${{ secrets.GIT_TOKEN }}

     - name: Print version
       run: |
         echo "Version being used in this build is: ${{ needs.find-changed-services.outputs.version }}"

     - name: Update README.md
       run: |
         # Use the version generated in the first job
         VERSION="${{ needs.find-changed-services.outputs.version }}"
         SERVICES=$(echo "${{ needs.find-changed-services.outputs.services }}" | sed 's/\[\|\]//g')
         readme_path=".github-private/profile/README.md"
        
         # Print the path to verify
         echo "Updating README at: $readme_path with version: $VERSION"

         # Process the services list and update README
         IFS=',' read -ra services <<< $SERVICES
         for service in "${services[@]}"; do
           # Debugging: Print each service being updated
           echo "Updating version for service: $service with version: $VERSION"
          
           # Update the version inside the tags for the service using sed
           sed -i "s|<!-- ${service}_VERSION_START -->[^<]*<!-- ${service}_VERSION_END -->|<!-- ${service}_VERSION_START -->${VERSION}<!-- ${service}_VERSION_END -->|" $readme_path
         done
      
     - name: Update prod env files (kynect and upswing)
       run: |
         # Use the version generated in the first job
         VERSION="${{ needs.find-changed-services.outputs.version }}"
         SERVICES=$(echo "${{ needs.find-changed-services.outputs.services }}" | sed 's/\[\|\]//g')

         # List of files to update
         FILES=(
           "./devops/env/prod/prod-kynect-service.yaml"
           "./devops/env/prod/rc-kynect-service.yaml"
           "./devops/env/prod/gcp-as1-me-service.yaml"
         )

         # Process the services list
         IFS=',' read -ra services <<< "$SERVICES"

         for file in "${FILES[@]}"; do
           echo "Updating file: $file with version: $VERSION"

           for service in "${services[@]}"; do
             service=$(echo $service | xargs) # trim spaces

             echo "Updating appVersion for service: $service in $file"

             # Update appVersion under the service block
             sed -i "/^[[:space:]]*$service:/,/appVersion:/ s/appVersion:.*/appVersion: \"$VERSION\"/" "$file"
           done
         done

     - name: Print README after update
       run: cat .github-private/profile/README.md

     - name: Commit and push changes
       run: |
         cd .github-private
         ls -al
         git config --global user.email "action@github.com"
         git config --global user.name "GitHub Action"
         git add .
         git commit -m "Updated service versions in README and all prod environment values file"
         git push
         sleep 10
     

 deploy_images_upswing_prod:
   if: needs.find-changed-services.outputs.services != '[]'  # Only run if there are changed services
   uses: ./.github/workflows/deploy.yaml
   with:
     helm_env: prod-gcp-as1-me-service
     cluster_name: production 
     project_id: <project_id>
     region: asia-south1
   secrets:
     GCLOUD_KEY: ${{ secrets.GCLOUD_KEY }}
     GIT_TOKEN: ${{ secrets.GIT_TOKEN }}




