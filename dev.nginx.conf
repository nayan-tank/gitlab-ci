# Handles app.enecdev.ucglab.com
server {
    listen 80;
    server_name <domain_name>;

    root /usr/share/nginx/html/www;  # Angular or React build directory
    index index.html;

    access_log /var/log/nginx/app.access.log;
    error_log /var/log/nginx/app.error.log;

    # location / {
    #     # Only rewrite if not already under /app
    #     if ($request_uri !~* ^/app) {
    #         rewrite ^(.*)$ /app$1 redirect;
    #     }
    #     try_files $uri $uri/ /index.html;
    # }

    # Redirect root based on device
    # location = / {
    #     if ($is_mobile) {
    #         return 302 /app$request_uri;
    #     }

    #     if ($is_mobile == 0) {
    #         return 302 /web-app$request_uri;
    #     }
    # }

    # location = / {
    #     if ($is_mobile) {
    #         return 302 /app/;
    #     }
    #     return 302 /web-app/;
    # }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle Angular static assets (JS, CSS, etc.)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;  # Return 404 if file doesn't exist, don't fallback to index.html
    }
    # Specific handling for Angular chunks and modules
    location ~* \.(js|mjs)$ {
        add_header Content-Type application/javascript;
        try_files $uri =404;
    }

    # location @angular {
    #     try_files $uri $uri/ /index.html;
    # }
}

