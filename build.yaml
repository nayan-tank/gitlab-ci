name: Build Image 

on:
  workflow_call:
    outputs:
      services:
        description: "Changed services and build image with dev tag"
        value: ${{ jobs.find-changed-services.outputs.services }}


jobs:
  find-changed-services:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changed_subfolders.outputs.subfolders }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for all branches

      - name: Get list of changed subfolders
        id: changed_subfolders
        run: |
          # Fetch the latest changes from the main branch
          #git fetch origin main

          # Check if there are changes in the 'lib' folder compared to the main branch
          # lib_changes=$(git diff --name-only origin/main ${{ github.sha }} -- 'lib/*')
          # lib_changes=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'lib/*')
          lib_changes=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- 'lib/*')


          if [ -n "$lib_changes" ]; then
            echo "Changes detected in 'lib' folder. Including all first-level subfolders in 'src' except 'protos'."
            # Get all first-level subdirectories under 'src' except 'src/protos'
            subfolders=$(find src -mindepth 1 -maxdepth 1 -type d ! -name "protos" -exec basename {} \;)
          else
            echo "No changes in 'lib' folder. Checking changed first-level subfolders in 'src', excluding 'protos'."

            # Get the list of changed files in 'src' directory, ignoring 'src/protos' folder
            # changed_files=$(git diff --name-only origin/main ${{ github.sha }} -- 'src/*' ':!src/protos/*')
            # changed_files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'src/*' ':!src/protos/*')
            changed_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- 'src/*' ':!src/protos/*')

            echo "$changed_files"

            # Extract only the first-level subfolder names, filtering out nested subdirectories
            subfolders=$(echo "$changed_files" | awk -F'/' '{print $2}' | grep -v '^protos$' | sort -u)
          fi

          # Convert subfolders to JSON array format
          if [ -n "$subfolders" ]; then
            subfolders_json=$(echo "$subfolders" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            subfolders_json="[]"
          fi

          # Set the output for further use in the workflow
          echo "subfolders=$subfolders_json" >> $GITHUB_OUTPUT

      - name: Display changed subfolders
        run: |
          echo "Changed microservices:"
          echo "${{ steps.changed_subfolders.outputs.subfolders }}"


  build_microservices:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - find-changed-services  # Depends on the output of this job
    if: needs.find-changed-services.outputs.services != '[]'  # Only run if there are changed services
    strategy:
      matrix:
        service: ${{ fromJson(needs.find-changed-services.outputs.services) }}  # Use the list of changed services
    env:
      REGISTRY: ghcr.io
      REPO_IMAGE_NAME: <org_name/repo_name>

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v9
        with:
          gha-cache-key: v0
          named-caches-hash: ${{ hashFiles('python-default.lock') }}
          cache-lmdb-store: 'true'

      - name: Generating code version
        run: |-
          YEAR=$(date +'%y')
          MONTH=$(date +'%m')
          DAY=$(date +'%d')
          BUILD_NUMBER=${{ github.run_number }}
          VERSION="${YEAR}.${MONTH}.${DAY}.${BUILD_NUMBER}"
          echo "GIT_TAG=${VERSION}" >> $GITHUB_ENV

      - name: Update VERSION variable in config file
        run: |
          sed -i "s/version = .*/version = '${GIT_TAG}'/" src/${{ matrix.service }}/main.py

      - name: 🐳 Create Docker image
        run: |
          pants package src/${{ matrix.service }}:${{ matrix.service }}_image

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Push image to registry with "dev" tag
        run: |-
          docker tag ${{ matrix.service }}_image:latest ${{ env.REGISTRY }}/${{ env.REPO_IMAGE_NAME }}/${{ matrix.service }}_image:dev
          docker push ${{ env.REGISTRY }}/${{ env.REPO_IMAGE_NAME }}/${{ matrix.service }}_image:dev
